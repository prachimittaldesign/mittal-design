    <!-- Loaded async (preload + swap-on-load), not as a blocking stylesheet:
         a browser must finish every <link rel="stylesheet"> that precedes a
         <script type="module"> before that script can execute — so on a
         slow, blocked, or unreachable fonts.googleapis.com, a synchronous
         link here would delay the ENTIRE app (including the boot loader and
         the 3-second watchdog below) far past 3 seconds. This pattern lets
         the font apply whenever it arrives without blocking anything. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      />
    </noscript>
    <!-- Zero-dependency boot loader, inlined so it paints before any JS runs
         or the CSS bundle loads — the "never a blank screen" guarantee. Its
         markup below is replaced the instant React mounts (src/components/
         BootLoader.tsx renders the identical look), and on "/projects" this
         style never shows at all (removed before paint by the tiny script
         at the end of body). -->
    <style>
      #boot-loader{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;background:#fdfbf6}
      #boot-loader .mark{display:flex;align-items:center;gap:10px;font-family:Inter,-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;font-size:clamp(22px,5vw,34px);font-weight:800;letter-spacing:-.02em;color:#1b1b1b}
      #boot-loader .box{border:2px solid #1b1b1b;border-radius:10px;padding:2px 10px 4px}
      #boot-loader .dots{display:flex;gap:7px}
      #boot-loader .dots i{width:7px;height:7px;border-radius:50%;background:#1b1b1b;opacity:.25;animation:boot-pulse 1.1s ease-in-out infinite;font-style:normal}
      #boot-loader .dots i:nth-child(2){animation-delay:.15s}
      #boot-loader .dots i:nth-child(3){animation-delay:.3s}
      @keyframes boot-pulse{0%,80%,100%{opacity:.25;transform:scale(1)}40%{opacity:1;transform:scale(1.25)}}
      @media (prefers-reduced-motion: reduce){#boot-loader .dots i{animation:none;opacity:.6}}
    </style>
  </head>
  <body>
    <div id="root"><div id="boot-loader" role="status" aria-live="polite" aria-label="Loading the city">
      <div class="mark"><span>Prachi</span><span class="box">Mittal</span></div>
      <div class="dots" aria-hidden="true"><i></i><i></i><i></i></div>
    </div></div>
    <script>
      // Skip the loader entirely when landing straight on the fallback page —
      // it has no city to wait for, so painting the loader first would just
      // be a needless flash before React swaps it for the real page anyway.
      if (location.pathname === '/projects') document.getElementById('boot-loader').remove()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
